<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Web App</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">MyApp</a>
    <div>
      <a class="nav-link d-inline text-white" href="#">Home</a>
      <a class="nav-link d-inline text-white" href="#">Login</a>
      <a class="nav-link d-inline text-white" href="#">Cart</a>
    </div>
  </div>
</nav>

<!-- Form -->
<div class="container mt-5">
  <div class="card p-4 mx-auto" style="max-width:400px;">
    <h3 class="text-center">Login / Register</h3>

    <form id="myForm">
      <input type="text" id="name" class="form-control mb-3" placeholder="Name">
      <input type="email" id="email" class="form-control mb-3" placeholder="Email">
      <input type="password" id="password" class="form-control mb-3" placeholder="Password">

      <button class="btn btn-primary w-100">Submit</button>
    </form>
  </div>
</div>

<!-- Products -->
<div class="container mt-5">
  <div class="row">

    <div class="col-md-4">
      <div class="card p-3 text-center">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=500&q=80" alt="Product 1" class="card-img-top product-image">
        <h5>Product 1</h5>
        <p>₹100</p>
        <button class="btn btn-success">Add to Cart</button>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3 text-center">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=500&q=80" alt="Product 2" class="card-img-top product-image">
        <h5>Product 2</h5>
        <p>₹200</p>
        <button class="btn btn-success">Add to Cart</button>
      </div>
    </div>

  </div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
