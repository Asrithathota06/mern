<!DOCTYPE html>
<html>
<head>
    <title>Web App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<div class="nav">
    <h2>My App</h2>
    <div>
        <a href="#">Home</a>
        <a href="#">Login</a>
        <a href="#">Cart</a>
    </div>
</div>

<!-- Form Section -->
<div class="form-container">
    <h2>Login / Register</h2>
    <form id="myForm">
        <input type="text" id="name" placeholder="Name"><br>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button type="submit">Submit</button>
    </form>
</div>

<!-- Product Section -->
<div class="container">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=500&q=80" alt="Product 1">
        <h3>Product 1</h3>
        <p>₹100</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=500&q=80" alt="Product 2">
        <h3>Product 2</h3>
        <p>₹200</p>
        <button>Add to Cart</button>
    </div>
</div>

<!-- Link JS -->
<script src="script.js"></script>

</body>
</html>
