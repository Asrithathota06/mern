<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cart</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body data-page="cart" class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">

  <div class="container">

    <a class="navbar-brand" href="#">ShopLite</a>

    <div class="navbar-nav flex-row gap-3">

      <a class="nav-link" href="index.html">Register</a>

      <a class="nav-link" href="login.html">Login</a>

      <a class="nav-link" href="catalog.html">Catalog</a>

      <a class="nav-link active" href="cart.html">
        Cart
        <span id="cartCount" class="badge bg-light text-dark">0</span>
      </a>

      <button id="logoutBtn" class="btn btn-danger btn-sm">
        Logout
      </button>

    </div>

  </div>

</nav>

<!-- Cart Section -->
<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-6">

      <div class="card shadow">

        <div class="card-body">

          <h2 class="text-center mb-4">Your Cart</h2>

          <ul
            id="cartItems"
            class="list-group mb-3"
          >
            <li class="list-group-item">
              No items added
            </li>
          </ul>

          <h4>
            Total :
            <span id="cartTotal">₹0</span>
          </h4>

          <div class="mt-3 d-flex gap-2">

            <a
              href="catalog.html"
              class="btn btn-outline-dark"
            >
              Back
            </a>

            <button
              id="clearCart"
              class="btn btn-dark"
            >
              Clear Cart
            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
