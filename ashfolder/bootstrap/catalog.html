<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Catalog</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body data-page="catalog" class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">

  <div class="container">

    <a class="navbar-brand" href="#">ShopLite</a>

    <div class="navbar-nav flex-row gap-3">

      <a class="nav-link" href="index.html">Register</a>

      <a class="nav-link" href="login.html">Login</a>

      <a class="nav-link active" href="catalog.html">Catalog</a>

      <a class="nav-link" href="cart.html">
        Cart
        <span id="cartCount" class="badge bg-light text-dark">0</span>
      </a>

      <button id="logoutBtn" class="btn btn-danger btn-sm">
        Logout
      </button>

    </div>

  </div>

</nav>

<!-- Products -->
<div class="container mt-5">

  <div class="row g-4">

    <!-- Product 1 -->
    <div class="col-md-3">

      <div class="card h-100 shadow">

        <img
          src="https://images.unsplash.com/photo-1542291026-7eec264c27ff"
          class="card-img-top"
          alt="Shoes"
        >

        <div class="card-body">

          <h5>Running Shoes</h5>

          <p>₹2499</p>

          <button
            class="btn btn-dark add-to-cart"
            data-name="Running Shoes"
            data-price="2499"
          >
            Add to Cart
          </button>

        </div>

      </div>

    </div>

    <!-- Product 2 -->
    <div class="col-md-3">

      <div class="card h-100 shadow">

        <img
          src="https://images.unsplash.com/photo-1523275335684-37898b6baf30"
          class="card-img-top"
          alt="Watch"
        >

        <div class="card-body">

          <h5>Smart Watch</h5>

          <p>₹3999</p>

          <button
            class="btn btn-dark add-to-cart"
            data-name="Smart Watch"
            data-price="3999"
          >
            Add to Cart
          </button>

        </div>

      </div>

    </div>

    <!-- Product 3 -->
    <div class="col-md-3">

      <div class="card h-100 shadow">

        <img
          src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f"
          class="card-img-top"
          alt="Headphones"
        >

        <div class="card-body">

          <h5>Headphones</h5>

          <p>₹1799</p>

          <button
            class="btn btn-dark add-to-cart"
            data-name="Headphones"
            data-price="1799"
          >
            Add to Cart
          </button>

        </div>

      </div>

    </div>

    <!-- Product 4 -->
    <div class="col-md-3">

      <div class="card h-100 shadow">

        <img
          src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f"
          class="card-img-top"
          alt="Backpack"
        >

        <div class="card-body">

          <h5>Backpack</h5>

          <p>₹1299</p>

          <button
            class="btn btn-dark add-to-cart"
            data-name="Backpack"
            data-price="1299"
          >
            Add to Cart
          </button>

        </div>

      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
