<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body data-page="register" class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" href="#">ShopLite</a>

    <div class="navbar-nav ms-auto">
      <a class="nav-link active" href="index.html">Register</a>
      <a class="nav-link" href="login.html">Login</a>
      <a class="nav-link" href="catalog.html">Catalog</a>
      <a class="nav-link" href="cart.html">
        Cart <span id="cartCount" class="badge bg-light text-dark">0</span>
      </a>
    </div>

  </div>
</nav>

<!-- Register Form -->
<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-6">

      <div class="card shadow">

        <div class="card-body">

          <h2 class="text-center mb-4">Register</h2>

          <form id="registerForm">

            <div class="mb-3">
              <label class="form-label">Name</label>
              <input
                type="text"
                id="registerName"
                class="form-control"
                placeholder="Enter Name"
              >
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input
                type="email"
                id="registerEmail"
                class="form-control"
                placeholder="Enter Email"
              >
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input
                type="password"
                id="registerPassword"
                class="form-control"
                placeholder="Enter Password"
              >
            </div>

            <button class="btn btn-primary w-100">
              Register
            </button>

            <p id="registerMessage" class="text-success mt-3"></p>

          </form>

        </div>

      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
