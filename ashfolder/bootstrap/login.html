<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body data-page="login" class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" href="#">ShopLite</a>

    <div class="navbar-nav flex-row gap-3">

      <a class="nav-link" href="index.html">Register</a>

      <a class="nav-link active" href="login.html">Login</a>

      <a class="nav-link" href="catalog.html">Catalog</a>

      <a class="nav-link" href="cart.html">
        Cart
        <span id="cartCount" class="badge bg-light text-dark">0</span>
      </a>

    </div>

  </div>
</nav>

<!-- Login Form -->
<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-5">

      <div class="card shadow">

        <div class="card-body">

          <h2 class="text-center mb-4">Login</h2>

          <form id="loginForm">

            <div class="mb-3">

              <label class="form-label">Email</label>

              <input
                type="email"
                id="loginEmail"
                class="form-control"
                placeholder="Enter Email"
              >

            </div>

            <div class="mb-3">

              <label class="form-label">Password</label>

              <input
                type="password"
                id="loginPassword"
                class="form-control"
                placeholder="Enter Password"
              >

            </div>

            <button class="btn btn-dark w-100">
              Login
            </button>

            <p id="loginMessage" class="text-success mt-3"></p>

          </form>

        </div>

      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
